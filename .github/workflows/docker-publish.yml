name: Docker Publish and Deploy

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AZURE_VM_USER: ${{ secrets.SSH_USER }}
  AZURE_VM_HOST: ${{ secrets.SSH_HOST }}
  AZURE_VM_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-azure:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ env.AZURE_VM_KEY }}
          known_hosts: "just-a-placeholder-so-we-skip-known-hosts"

      - name: Deploy to Azure VM
        run: |
          # Extract the image tag from the build job
          IMAGE_TAG=$(echo "${{ needs.build-and-push-image.outputs.image-tag }}" | sed 's/.*://')
          
          # SSH into the Azure VM and deploy
          ssh -o StrictHostKeyChecking=no \
            -i ~/.ssh/id_rsa \
            ${{ env.AZURE_VM_USER }}@${{ env.AZURE_VM_HOST }} \
            "cd ~/app && \
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} && \
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG && \
            docker-compose -f docker-compose.prod.yml down && \
            docker-compose -f docker-compose.prod.yml up -d"
